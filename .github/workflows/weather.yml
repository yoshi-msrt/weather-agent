name: Weather Agent (No AI)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"          # 毎日 09:00 JST（UTC 0:00）

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TZ: Asia/Tokyo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip requests certifi urllib3

      - name: Run agent
        id: run_agent_out
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          CITY: Fukuoka,jp               # ← 福岡指定
        run: |
          if [ -z "${OPENWEATHER_API_KEY}" ]; then
            echo "ERROR: OPENWEATHER_API_KEY secret is not set." >&2
            exit 1
          fi
          python weather_agent.py | tee agent_output.txt
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat agent_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "【天気エージェント】本日の天気（${{ env.CITY }}）"
          to: ${{ secrets.TO_EMAIL }}
          from: ${{ secrets.FROM_EMAIL }}
          content_type: text/plain; charset=UTF-8
          body: |
            実行レポート（${{ github.run_id }}）
            リポジトリ: ${{ github.repository }}
            ブランチ: ${{ github.ref_name }}

            --- 出力（抜粋） ---
            ${{ steps.run_agent_out.outputs.body }}
        env:
          CITY: Fukuoka,jp